name: Check main.py Output

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Verify output
        run: |
          output=$(python main.py)
          test "$output" = "Hello, this is coming from my main.py file"
